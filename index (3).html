<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>respiro</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --serif: Georgia, 'Times New Roman', serif;
  --sans: system-ui, -apple-system, sans-serif;
  --areia: #f5f0e8;
  --areia2: #ede7d8;
  --text-dark: #1a1a18;
  --text-soft: #8a8a80;
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--sans);
  background: #111;
  overflow-x: hidden;
}

/* ── VIEWS ── */
.view {
  display: none;
  min-height: 100vh;
}
.view.active {
  display: block;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.4rem 2.5rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  pointer-events: none;
}
nav * { pointer-events: all; }
.logo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.45rem; color: #fff; cursor: pointer;
  letter-spacing: 0.02em;
}
.nav-links { display: flex; gap: 2rem; }
.nav-links button {
  background: none; border: none;
  color: rgba(255,255,255,0.72); font-size: 0.75rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s;
}
.nav-links button:hover { color: #fff; }

/* ── HERO ── */
#view-hero {
  position: relative;
  height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background-color: #151910;
  background-size: cover; background-position: center;
  filter: blur(8px) brightness(0.42);
  transform: scale(1.06);
  transition: background-image 0.9s ease;
}
.hero-veil {
  position: absolute; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.32);
}
.hero-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  max-width: 660px; padding: 0 1.5rem;
  width: 100%;
}
.hero-semana {
  font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.48); margin-bottom: 1.6rem;
}
.hero-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  color: #fff; line-height: 1.18; margin-bottom: 1.6rem;
}
.hero-trecho {
  font-size: clamp(0.88rem, 2vw, 1rem);
  color: rgba(255,255,255,0.68); line-height: 1.9;
  font-style: italic; margin-bottom: 2.8rem;
  max-width: 520px;
}
.btn-ler {
  padding: 0.78rem 2.8rem;
  border: 1px solid rgba(255,255,255,0.42); color: #fff;
  font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  background: transparent; cursor: pointer;
  transition: background 0.25s, border-color 0.25s;
}
.btn-ler:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.75); }

/* dots laterais */
.semanas-nav {
  position: fixed; right: 1.4rem; top: 50%; transform: translateY(-50%);
  z-index: 150; display: flex; flex-direction: column; gap: 10px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.28); cursor: pointer; transition: all 0.22s;
}
.dot.active { background: #fff; transform: scale(1.5); }

/* botões fixos */
.btn-som, .btn-escrever {
  position: fixed; bottom: 1.6rem; z-index: 150;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.65); font-size: 0.66rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 0.48rem 1rem; cursor: pointer;
  transition: all 0.22s; border-radius: 2px;
}
.btn-som { left: 1.6rem; }
.btn-escrever { right: 1.6rem; }
.btn-som:hover, .btn-escrever:hover { background: rgba(255,255,255,0.16); color: #fff; }
.btn-som.on { color: #fff; border-color: rgba(255,255,255,0.5); }

@keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:1} }
.som-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: #7abf8a; margin-right: 5px; vertical-align: middle;
  animation: pulse 1.6s ease infinite;
}

/* ── LEITURA ── */
#view-leitura { position: relative; background: transparent; }
.leitura-bg {
  position: fixed; inset: 0; z-index: 0;
  background-color: #111;
  background-size: cover; background-position: center;
  filter: blur(14px) brightness(0.3);
  transform: scale(1.1);
}
.leitura-veil { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.52); }
.leitura-corpo {
  position: relative; z-index: 2;
  max-width: 560px; margin: 0 auto;
  padding: 7.5rem 1.5rem 6rem;
}
.leitura-semana {
  font-size: 0.66rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 1rem;
}
.leitura-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(1.7rem, 4vw, 2.8rem);
  color: #fff; line-height: 1.22; margin-bottom: 2.8rem;
}
.leitura-sep { width: 36px; height: 1px; background: rgba(255,255,255,0.2); margin-bottom: 2.8rem; }
.leitura-texto {
  font-size: 1.03rem; line-height: 2.05;
  color: rgba(255,255,255,0.8); white-space: pre-wrap;
}
.btn-voltar {
  display: inline-flex; align-items: center; gap: 8px;
  background: none; border: none;
  color: rgba(255,255,255,0.4); font-size: 0.7rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s; margin-top: 3.5rem;
}
.btn-voltar:hover { color: rgba(255,255,255,0.85); }

/* ── ARQUIVO ── */
#view-arquivo { background: var(--areia); }
.arquivo-topo {
  padding: 7rem 1.5rem 3rem; text-align: center;
}
.arquivo-logo {
  font-family: var(--serif); font-style: italic;
  font-size: 2rem; color: var(--text-dark); margin-bottom: 0.5rem;
}
.arquivo-sub {
  font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-soft);
}
.arquivo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1px; background: #c8c2b4;
}
.arquivo-card {
  position: relative; overflow: hidden; cursor: pointer;
  aspect-ratio: 3/4; background: var(--areia2);
}
.arquivo-card-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center; background-color: #2a2820;
  filter: brightness(0.58); transition: transform 0.4s ease, filter 0.3s;
}
.arquivo-card:hover .arquivo-card-bg { transform: scale(1.04); filter: brightness(0.46); }
.arquivo-card-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2rem 1.1rem 1.1rem;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: #fff;
}
.arquivo-semana-num {
  font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.55;
}
.arquivo-card-titulo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.05rem; margin-top: 0.3rem; line-height: 1.3;
}

/* ── MENSAGEM ── */
#view-mensagem {
  background: #0c0c0a; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1.5rem;
}
.msg-box { max-width: 500px; width: 100%; }
.msg-titulo {
  font-family: var(--serif); font-style: italic;
  font-size: clamp(1.5rem, 4vw, 1.9rem);
  color: rgba(255,255,255,0.88); margin-bottom: 0.5rem;
}
.msg-sub {
  font-size: 0.76rem; color: rgba(255,255,255,0.3);
  letter-spacing: 0.07em; margin-bottom: 2.5rem;
}
.msg-textarea {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.82); padding: 1.2rem;
  font-size: 1rem; font-family: var(--serif); font-style: italic;
  line-height: 1.75; resize: none; height: 155px;
  border-radius: 2px; outline: none; transition: border-color 0.2s;
}
.msg-textarea:focus { border-color: rgba(255,255,255,0.26); }
.msg-textarea::placeholder { color: rgba(255,255,255,0.17); }
.msg-count {
  text-align: right; font-size: 0.68rem;
  color: rgba(255,255,255,0.2); margin-top: 0.4rem;
}
.btn-enviar {
  margin-top: 1.5rem; width: 100%; padding: 0.88rem;
  background: transparent; border: 1px solid rgba(255,255,255,0.26);
  color: rgba(255,255,255,0.6); font-size: 0.72rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; transition: all 0.25s;
}
.btn-enviar:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.52); }
.msg-ok { display: none; text-align: center; padding: 2.5rem 0; }
.msg-ok p {
  font-family: var(--serif); font-style: italic;
  font-size: 1.1rem; color: rgba(255,255,255,0.62); line-height: 1.85;
}

/* ── LOGIN ── */
#view-login {
  background: var(--areia); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
.login-box { max-width: 300px; width: 100%; text-align: center; }
.login-logo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.9rem; color: var(--text-dark); margin-bottom: 0.3rem;
}
.login-sub {
  font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-soft); margin-bottom: 2rem;
}
.login-input {
  width: 100%; background: #fff; border: 1px solid #ddd8cc;
  color: var(--text-dark); padding: 0.8rem 1rem; font-size: 1rem;
  border-radius: 2px; outline: none; text-align: center;
  letter-spacing: 0.25em; margin-bottom: 1rem; transition: border-color 0.2s;
}
.login-input:focus { border-color: #aaa090; }
.btn-entrar {
  width: 100%; padding: 0.8rem; background: var(--text-dark); color: #fff;
  border: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: opacity 0.2s;
}
.btn-entrar:hover { opacity: 0.8; }
.login-erro { font-size: 0.75rem; color: #a05040; margin-top: 0.7rem; display: none; }

/* ── ADMIN ── */
#view-admin { background: var(--areia); min-height: 100vh; }
.admin-wrap { max-width: 660px; margin: 0 auto; padding: 5.5rem 1.5rem 4rem; }
.admin-logo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.5rem; color: var(--text-dark); margin-bottom: 0.2rem;
}
.admin-sub {
  font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-soft); margin-bottom: 2.5rem;
}
.campo { margin-bottom: 1.8rem; }
.campo label {
  display: block; font-size: 0.66rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.5rem;
}
.campo input, .campo textarea {
  width: 100%; background: #fff; border: 1px solid #ddd8cc;
  color: var(--text-dark); padding: 0.75rem 1rem; font-size: 0.95rem;
  font-family: var(--serif); border-radius: 2px; outline: none;
  transition: border-color 0.2s;
}
.campo input:focus, .campo textarea:focus { border-color: #aaa090; }
.campo textarea { resize: vertical; min-height: 175px; line-height: 1.7; }
.file-label {
  display: flex; align-items: center; gap: 10px;
  border: 1px dashed #c5bdb0; padding: 0.9rem 1.1rem; cursor: pointer;
  color: var(--text-soft); font-size: 0.78rem; border-radius: 2px;
  background: #fff; transition: border-color 0.2s;
}
.file-label:hover { border-color: #a09888; }
.file-label input { display: none; }
.preview-img, .preview-vid {
  margin-top: 0.75rem; width: 100%; max-height: 145px;
  object-fit: cover; border-radius: 2px; display: none;
}
.btn-publicar {
  width: 100%; padding: 0.9rem; background: var(--text-dark); color: #fff;
  border: none; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: opacity 0.2s;
}
.btn-publicar:hover { opacity: 0.8; }
.admin-status { font-size: 0.78rem; margin-top: 0.75rem; }
.ok  { color: #4a7a5a; }
.err { color: #a05040; }
hr.sep { border: none; border-top: 1px solid #ddd8cc; margin: 2.5rem 0; }
.msgs-titulo {
  font-size: 0.66rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-soft); margin-bottom: 1rem;
}
.msg-card {
  background: #fff; border: 1px solid #e5dfd5; border-radius: 2px;
  padding: 1rem 1.1rem; margin-bottom: 0.75rem; position: relative;
}
.msg-card.nova { border-left: 3px solid #8a7a60; }
.msg-card-txt {
  font-family: var(--serif); font-style: italic;
  font-size: 0.92rem; color: var(--text-dark); line-height: 1.7; margin-bottom: 0.35rem;
}
.msg-card-data { font-size: 0.66rem; color: var(--text-soft); }
.btn-del {
  position: absolute; top: 0.75rem; right: 0.75rem;
  background: none; border: none; color: #ccc8c0; cursor: pointer;
  font-size: 1rem; line-height: 1; transition: color 0.2s;
}
.btn-del:hover { color: #999; }
.sem-msgs { font-size: 0.82rem; color: var(--text-soft); font-style: italic; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  nav { padding: 1rem 1.2rem; }
  .nav-links { gap: 1.2rem; }
  .btn-som { font-size: 0.6rem; padding: 0.42rem 0.8rem; left: 1rem; bottom: 1rem; }
  .btn-escrever { font-size: 0.6rem; padding: 0.42rem 0.8rem; right: 1rem; bottom: 1rem; }
  .semanas-nav { right: 0.6rem; }
  .arquivo-grid { grid-template-columns: repeat(2, 1fr); }
  .leitura-corpo { padding: 6rem 1.2rem 4rem; }
}
</style>
</head>
<body>

<nav id="nav">
  <div class="logo" onclick="ir('hero')">respiro</div>
  <div class="nav-links">
    <button onclick="ir('arquivo')">arquivo</button>
    <button onclick="ir('mensagem')">escrever</button>
  </div>
</nav>

<!-- HERO -->
<div class="view active" id="view-hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-veil"></div>
  <div class="hero-content">
    <p class="hero-semana" id="hero-semana"></p>
    <h1 class="hero-titulo" id="hero-titulo"></h1>
    <p class="hero-trecho" id="hero-trecho"></p>
    <button class="btn-ler" onclick="irLeitura()">ler o texto completo</button>
  </div>
  <div class="semanas-nav" id="semanas-nav"></div>
  <button class="btn-som" id="btn-som" onclick="toggleSom()">som ambiente</button>
  <button class="btn-escrever" onclick="ir('mensagem')">deixe algo aqui</button>
</div>

<!-- LEITURA -->
<div class="view" id="view-leitura">
  <div class="leitura-bg" id="leitura-bg"></div>
  <div class="leitura-veil"></div>
  <div class="leitura-corpo">
    <p class="leitura-semana" id="leitura-semana"></p>
    <h1 class="leitura-titulo" id="leitura-titulo"></h1>
    <div class="leitura-sep"></div>
    <p class="leitura-texto" id="leitura-texto"></p>
    <button class="btn-voltar" onclick="ir('hero')">&#8592; voltar</button>
  </div>
</div>

<!-- ARQUIVO -->
<div class="view" id="view-arquivo">
  <div class="arquivo-topo">
    <div class="arquivo-logo">respiro</div>
    <div class="arquivo-sub">arquivo de textos</div>
  </div>
  <div class="arquivo-grid" id="arquivo-grid"></div>
</div>

<!-- MENSAGEM -->
<div class="view" id="view-mensagem">
  <div class="msg-box">
    <h2 class="msg-titulo">o que você carrega hoje?</h2>
    <p class="msg-sub">sua mensagem chegará só a mim. com cuidado.</p>
    <div id="msg-form">
      <textarea class="msg-textarea" id="msg-input" placeholder="hoje eu sinto..." maxlength="300" oninput="contarChars()"></textarea>
      <div class="msg-count"><span id="msg-chars">0</span>/300</div>
      <button class="btn-enviar" onclick="enviar()">enviar</button>
    </div>
    <div class="msg-ok" id="msg-ok">
      <p>obrigada por confiar.<br>isso chegou até mim.</p>
      <button class="btn-voltar" style="margin-top:2rem;display:inline-flex;" onclick="ir('hero')">&#8592; voltar</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div class="view" id="view-login">
  <div class="login-box">
    <div class="login-logo">respiro</div>
    <div class="login-sub">painel</div>
    <input type="password" class="login-input" id="login-senha" placeholder="· · · · · ·">
    <button class="btn-entrar" onclick="login()">entrar</button>
    <p class="login-erro" id="login-erro">senha incorreta</p>
  </div>
</div>

<!-- ADMIN -->
<div class="view" id="view-admin">
  <div class="admin-wrap">
    <div class="admin-logo">respiro</div>
    <div class="admin-sub">painel de publicação</div>

    <div class="campo">
      <label>título do texto</label>
      <input type="text" id="a-titulo" placeholder="como eu chamo este texto...">
    </div>
    <div class="campo">
      <label>texto completo</label>
      <textarea id="a-texto" placeholder="escreva aqui..."></textarea>
    </div>
    <div class="campo">
      <label>mídia da semana (imagem ou vídeo curto)</label>
      <label class="file-label">
        <input type="file" id="a-midia" accept="image/*,video/*" onchange="prevMidia(this)">
        <span id="a-file-nome">escolher arquivo...</span>
      </label>
      <img class="preview-img" id="prev-img" alt="">
      <video class="preview-vid" id="prev-vid" muted loop playsinline></video>
    </div>
    <div class="campo">
      <label>número da semana</label>
      <input type="number" id="a-semana" placeholder="ex: 01" min="1" style="width:120px">
    </div>
    <button class="btn-publicar" onclick="publicar()">publicar esta semana</button>
    <p class="admin-status" id="a-status"></p>

    <hr class="sep">
    <div class="msgs-titulo">mensagens recebidas</div>
    <div id="a-msgs"></div>
    <button class="btn-voltar" style="margin-top:1.5rem;display:inline-flex;color:var(--text-soft);" onclick="ir('hero')">&#8592; sair</button>
  </div>
</div>

<script>
/* ── CONFIG ── */
const SENHA = 'respiro2025';

/* ── DADOS PADRÃO ── */
const PADRAO = [
  { id:1, semana:'01', ano:'2025',
    titulo:'o peso das coisas leves',
    texto:'Há coisas que não pesam nada e ainda assim nos curvam.\n\nComo uma palavra dita de passagem que ficou. Como a luz de uma tarde específica que nunca mais voltou exatamente assim. Como o cheiro de uma pessoa que já foi.\n\nEu penso nisso às vezes — no que nos curva sem nos quebrar. No que fica no corpo como memória que não escolhemos guardar.\n\nTalvez seja isso: que o leve pode ser o mais permanente de tudo.',
    midia:'', tipo:'image' },
  { id:2, semana:'02', ano:'2025',
    titulo:'chuva sobre o que não está lá',
    texto:'Choveu hoje sobre a cidade inteira.\n\nEu pensei em você — não da forma que machuca, mas da forma que reconhece. Como quando você vê um pássaro específico e lembra de algo que não tem nome.\n\nA chuva não pergunta se é hora. Ela só chega, cobre tudo por um tempo, e vai. Deixa o ar diferente.\n\nTalvez seja essa a graça das coisas que passam.',
    midia:'', tipo:'image' }
];

/* ── ESTADO ── */
let idx = 0, logado = false;
let audioCtx = null, somLigado = false, somNos = {};

/* ── STORAGE ── */
function textos() {
  try { const s = localStorage.getItem('r_textos'); return s ? JSON.parse(s) : PADRAO; }
  catch(e) { return PADRAO; }
}
function salvarTextos(t) { try { localStorage.setItem('r_textos', JSON.stringify(t)); } catch(e){} }
function mensagens() {
  try { const s = localStorage.getItem('r_msgs'); return s ? JSON.parse(s) : []; }
  catch(e) { return []; }
}
function salvarMensagens(m) { try { localStorage.setItem('r_msgs', JSON.stringify(m)); } catch(e){} }

/* ── NAVEGAÇÃO ── */
function ir(id) {
  if (id === 'admin' && !logado) { id = 'login'; }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.getElementById('nav').style.display = (id === 'login') ? 'none' : 'flex';
  if (id === 'hero')     renderHero();
  if (id === 'arquivo')  renderArquivo();
  if (id === 'admin')    renderAdmin();
  if (id === 'mensagem') resetMsg();
  window.scrollTo(0, 0);
}

/* ── HERO ── */
function renderHero() {
  const ts = textos();
  if (!ts.length) return;
  idx = Math.min(idx, ts.length - 1);
  mostrar(idx);
  const nav = document.getElementById('semanas-nav');
  nav.innerHTML = '';
  ts.forEach(function(_, i) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    d.onclick = function() { idx = i; mostrar(i); };
    nav.appendChild(d);
  });
}

function mostrar(i) {
  const ts = textos(), t = ts[i];
  document.getElementById('hero-semana').textContent = 'semana ' + t.semana + ' · ' + t.ano;
  document.getElementById('hero-titulo').textContent = t.titulo;
  const p = t.texto.split('\n\n')[0];
  document.getElementById('hero-trecho').textContent = p.length > 130 ? p.slice(0,130) + '…' : p;
  const bg = document.getElementById('hero-bg');
  bg.style.backgroundImage = (t.midia && t.tipo === 'image') ? "url('" + t.midia + "')" : 'none';
  document.querySelectorAll('.dot').forEach(function(d, j) { d.classList.toggle('active', j === i); });
  idx = i;
}

/* ── LEITURA ── */
function irLeitura() {
  const ts = textos(), t = ts[idx];
  document.getElementById('leitura-semana').textContent = 'semana ' + t.semana + ' · ' + t.ano;
  document.getElementById('leitura-titulo').textContent = t.titulo;
  document.getElementById('leitura-texto').textContent = t.texto;
  const bg = document.getElementById('leitura-bg');
  bg.style.backgroundImage = (t.midia && t.tipo === 'image') ? "url('" + t.midia + "')" : 'none';
  ir('leitura');
}

/* ── ARQUIVO ── */
function renderArquivo() {
  const ts = textos(), grid = document.getElementById('arquivo-grid');
  grid.innerHTML = '';
  ts.forEach(function(t, i) {
    const c = document.createElement('div');
    c.className = 'arquivo-card';
    const bg = (t.midia && t.tipo === 'image')
      ? "background-image:url('" + t.midia + "');background-color:#2a2820;"
      : "background-color:#2a2820;";
    c.innerHTML =
      '<div class="arquivo-card-bg" style="' + bg + '"></div>' +
      '<div class="arquivo-card-info">' +
        '<div class="arquivo-semana-num">semana ' + t.semana + '</div>' +
        '<div class="arquivo-card-titulo">' + esc(t.titulo) + '</div>' +
      '</div>';
    c.onclick = function() { idx = i; irLeitura(); };
    grid.appendChild(c);
  });
}

/* ── MENSAGEM ── */
function contarChars() {
  document.getElementById('msg-chars').textContent = document.getElementById('msg-input').value.length;
}
function resetMsg() {
  document.getElementById('msg-input').value = '';
  document.getElementById('msg-chars').textContent = '0';
  document.getElementById('msg-form').style.display = 'block';
  document.getElementById('msg-ok').style.display = 'none';
}
function enviar() {
  const txt = document.getElementById('msg-input').value.trim();
  if (!txt) return;
  const ms = mensagens();
  ms.unshift({ texto: txt, data: new Date().toLocaleDateString('pt-BR'), nova: true });
  salvarMensagens(ms);
  document.getElementById('msg-form').style.display = 'none';
  document.getElementById('msg-ok').style.display = 'block';
}

/* ── LOGIN ── */
function login() {
  const s = document.getElementById('login-senha').value;
  if (s === SENHA) {
    logado = true;
    document.getElementById('login-erro').style.display = 'none';
    document.getElementById('login-senha').value = '';
    document.getElementById('nav').style.display = 'flex';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-admin').classList.add('active');
    renderAdmin(); window.scrollTo(0,0);
  } else {
    document.getElementById('login-erro').style.display = 'block';
  }
}

/* ── ADMIN ── */
function prevMidia(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('a-file-nome').textContent = file.name;
  const img = document.getElementById('prev-img'), vid = document.getElementById('prev-vid');
  const r = new FileReader();
  r.onload = function(e) {
    if (file.type.startsWith('image')) {
      img.src = e.target.result; img.style.display = 'block'; vid.style.display = 'none';
    } else {
      vid.src = e.target.result; vid.style.display = 'block'; vid.play(); img.style.display = 'none';
    }
  };
  r.readAsDataURL(file);
}

function publicar() {
  const titulo = document.getElementById('a-titulo').value.trim();
  const texto  = document.getElementById('a-texto').value.trim();
  const sem    = document.getElementById('a-semana').value.trim();
  const fi     = document.getElementById('a-midia');
  const st     = document.getElementById('a-status');
  if (!titulo || !texto || !sem) { st.textContent = 'preencha título, texto e semana.'; st.className = 'admin-status err'; return; }

  function salvar(midia, tipo) {
    const ts = textos();
    ts.unshift({ id: Date.now(), semana: sem.padStart(2,'0'), ano: new Date().getFullYear().toString(), titulo, texto, midia, tipo });
    salvarTextos(ts); idx = 0;
    document.getElementById('a-titulo').value = '';
    document.getElementById('a-texto').value = '';
    document.getElementById('a-semana').value = '';
    document.getElementById('a-file-nome').textContent = 'escolher arquivo...';
    document.getElementById('prev-img').style.display = 'none';
    document.getElementById('prev-vid').style.display = 'none';
    fi.value = '';
    st.textContent = '✓ publicado com sucesso.'; st.className = 'admin-status ok';
    renderAdmin();
  }

  if (fi.files[0]) {
    const file = fi.files[0];
    if (file.size > 4*1024*1024) { st.textContent = 'arquivo muito grande (máx 4 MB).'; st.className = 'admin-status err'; return; }
    const tipo = file.type.startsWith('image') ? 'image' : 'video';
    const r = new FileReader();
    r.onload = function(e) { salvar(e.target.result, tipo); };
    r.readAsDataURL(file);
  } else { salvar('', 'image'); }
}

function renderAdmin() {
  const ms = mensagens(), c = document.getElementById('a-msgs');
  if (!ms.length) { c.innerHTML = '<p class="sem-msgs">nenhuma mensagem ainda.</p>'; return; }
  c.innerHTML = ms.map(function(m, i) {
    return '<div class="msg-card ' + (m.nova?'nova':'') + '">' +
      '<p class="msg-card-txt">"' + esc(m.texto) + '"</p>' +
      '<p class="msg-card-data">' + m.data + '</p>' +
      '<button class="btn-del" onclick="delMsg(' + i + ')">&#215;</button></div>';
  }).join('');
  ms.forEach(function(m) { m.nova = false; }); salvarMensagens(ms);
}

function delMsg(i) {
  const ms = mensagens(); ms.splice(i,1); salvarMensagens(ms); renderAdmin();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── SOM — natureza calma ── */
function criarSom() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = audioCtx, now = ctx.currentTime;

  // Ruído rosa (vento)
  const bufSz = 4 * ctx.sampleRate;
  const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i=0; i<bufSz; i++) {
    const w = Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
  }
  const vSrc = ctx.createBufferSource(); vSrc.buffer = buf; vSrc.loop = true;
  const vFilt = ctx.createBiquadFilter(); vFilt.type='bandpass'; vFilt.frequency.value=180; vFilt.Q.value=0.5;
  const vGain = ctx.createGain(); vGain.gain.setValueAtTime(0,now); vGain.gain.linearRampToValueAtTime(0.5,now+4);
  const vLFO = ctx.createOscillator(); vLFO.type='sine'; vLFO.frequency.value=0.05;
  const vLG = ctx.createGain(); vLG.gain.value=0.16;
  vLFO.connect(vLG); vLG.connect(vGain.gain); vLFO.start();
  vSrc.connect(vFilt); vFilt.connect(vGain);

  // Folhas
  const bF = ctx.createBuffer(1, bufSz, ctx.sampleRate);
  const dF = bF.getChannelData(0);
  for (let i=0; i<bufSz; i++) dF[i]=Math.random()*2-1;
  const fSrc = ctx.createBufferSource(); fSrc.buffer=bF; fSrc.loop=true;
  const fFilt = ctx.createBiquadFilter(); fFilt.type='highpass'; fFilt.frequency.value=4200; fFilt.Q.value=0.3;
  const fGain = ctx.createGain(); fGain.gain.setValueAtTime(0,now); fGain.gain.linearRampToValueAtTime(0.035,now+5);
  const fLFO = ctx.createOscillator(); fLFO.type='sine'; fLFO.frequency.value=0.11;
  const fLG = ctx.createGain(); fLG.gain.value=0.025;
  fLFO.connect(fLG); fLG.connect(fGain.gain); fLFO.start();
  fSrc.connect(fFilt); fFilt.connect(fGain);

  // Grilos
  const gOsc = ctx.createOscillator(); gOsc.type='sine'; gOsc.frequency.value=4200;
  const gGain = ctx.createGain(); gGain.gain.setValueAtTime(0,now); gGain.gain.linearRampToValueAtTime(0.015,now+6);
  const gTrem = ctx.createOscillator(); gTrem.type='sine'; gTrem.frequency.value=16;
  const gTG = ctx.createGain(); gTG.gain.value=0.012;
  gTrem.connect(gTG); gTG.connect(gGain.gain); gTrem.start();
  const gPulso = ctx.createOscillator(); gPulso.type='sine'; gPulso.frequency.value=0.07;
  const gPG = ctx.createGain(); gPG.gain.value=0.01;
  gPulso.connect(gPG); gPG.connect(gGain.gain); gPulso.start();
  gOsc.connect(gGain);

  // Master
  const master = ctx.createGain(); master.gain.value=0.36;
  vGain.connect(master); fGain.connect(master); gGain.connect(master);
  master.connect(ctx.destination);
  vSrc.start(); fSrc.start(); gOsc.start();

  somNos = { srcs:[vSrc,fSrc,gOsc], lfos:[vLFO,fLFO,gTrem,gPulso], master };
}

function pararSom() {
  if (!somNos.master) return;
  somNos.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime+2.5);
  setTimeout(function() {
    try { somNos.srcs.forEach(function(s){s.stop();}); somNos.lfos.forEach(function(l){l.stop();}); } catch(e){}
    somNos = {};
  }, 3000);
}

function toggleSom() {
  somLigado = !somLigado;
  const btn = document.getElementById('btn-som');
  if (somLigado) {
    criarSom();
    btn.innerHTML = '<span class="som-dot"></span>som ambiente';
    btn.classList.add('on');
  } else {
    pararSom();
    btn.innerHTML = 'som ambiente';
    btn.classList.remove('on');
  }
}

/* ── HASH ROUTING (admin oculto) ── */
function rotear() {
  if (window.location.hash === '#admin') ir(logado ? 'admin' : 'login');
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', function() {
  renderHero();
  rotear();
  window.addEventListener('hashchange', rotear);
  document.getElementById('login-senha').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });
});
</script>
