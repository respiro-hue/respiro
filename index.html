<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>respiro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --serif: Georgia, 'Times New Roman', serif;
  --sans: system-ui, -apple-system, sans-serif;
  --areia: #f5f0e8;
  --areia2: #ede7d8;
  --text-dark: #1a1a18;
  --text-soft: #8a8a80;
}

html { scroll-behavior: smooth; }

body {
  width: 100%;
  font-family: var(--sans);
  background: #111;
  overflow-x: hidden;
}

/* ════════════════════════════
   NAV
════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.4rem 2.5rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
  pointer-events: none;
}
nav * { pointer-events: all; }
.logo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.45rem; color: #fff; cursor: pointer;
  letter-spacing: 0.02em; text-decoration: none;
}
.logo:hover { opacity: 0.75; }

/* botão de conta no nav */
.nav-conta {
  background: none; border: 1px solid rgba(255,255,255,0.28);
  color: rgba(255,255,255,0.65); font-size: 0.65rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 0.4rem 1rem; cursor: pointer;
  transition: all 0.2s; border-radius: 2px;
}
.nav-conta:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
.nav-conta.logado { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.15); }

/* ════════════════════════════
   HERO
════════════════════════════ */
#hero {
  position: relative; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background-color: #151910;
  background-size: cover; background-position: center;
  filter: blur(8px) brightness(0.42);
  transform: scale(1.06);
  transition: background-image 0.9s ease;
}
.hero-veil { position: absolute; inset: 0; z-index: 1; background: rgba(0,0,0,0.32); }
.hero-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  max-width: 660px; padding: 0 1.5rem; width: 100%;
}
.hero-semana {
  font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.48); margin-bottom: 1.6rem;
}
.hero-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  color: #fff; line-height: 1.18; margin-bottom: 1.6rem;
}
.hero-trecho {
  font-size: clamp(0.88rem, 2vw, 1rem);
  color: rgba(255,255,255,0.68); line-height: 1.9;
  font-style: italic; margin-bottom: 2.8rem; max-width: 520px;
}
.btn-ler {
  padding: 0.78rem 2.8rem;
  border: 1px solid rgba(255,255,255,0.42); color: #fff;
  font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  background: transparent; cursor: pointer;
  transition: background 0.25s, border-color 0.25s;
}
.btn-ler:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.75); }

.semanas-nav {
  position: fixed; right: 1.4rem; top: 50%; transform: translateY(-50%);
  z-index: 150; display: flex; flex-direction: column; gap: 10px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.28); cursor: pointer; transition: all 0.22s;
}
.dot.active { background: #fff; transform: scale(1.5); }

.btn-som {
  position: fixed; bottom: 1.6rem; left: 1.6rem; z-index: 150;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.65); font-size: 0.66rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 0.48rem 1rem; cursor: pointer; transition: all 0.22s; border-radius: 2px;
}
.btn-som:hover { background: rgba(255,255,255,0.16); color: #fff; }
.btn-som.on { color: #fff; border-color: rgba(255,255,255,0.5); }

@keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:1} }
.som-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: #7abf8a; margin-right: 5px; vertical-align: middle;
  animation: pulse 1.6s ease infinite;
}

.hero-scroll-hint {
  position: absolute; bottom: 2.2rem; left: 50%; transform: translateX(-50%);
  z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: rgba(255,255,255,0.3); font-size: 0.6rem; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer;
  animation: fadeHint 3s ease 2s both;
}
@keyframes fadeHint { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.hero-scroll-hint svg { animation: bounce 2s ease infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

/* ════════════════════════════
   LEITURA (overlay)
════════════════════════════ */
#view-leitura {
  display: none; position: fixed; inset: 0; z-index: 300; overflow-y: auto;
}
#view-leitura.open { display: block; }
.leitura-bg {
  position: fixed; inset: 0; z-index: 0; background-color: #111;
  background-size: cover; background-position: center;
  filter: blur(14px) brightness(0.3); transform: scale(1.1);
}
.leitura-veil { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.52); }
.leitura-corpo {
  position: relative; z-index: 2; max-width: 560px; margin: 0 auto;
  padding: 7.5rem 1.5rem 6rem;
}
.leitura-semana {
  font-size: 0.66rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 1rem;
}
.leitura-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(1.7rem, 4vw, 2.8rem); color: #fff; line-height: 1.22; margin-bottom: 2.8rem;
}
.leitura-sep { width: 36px; height: 1px; background: rgba(255,255,255,0.2); margin-bottom: 2.8rem; }
.leitura-texto { font-size: 1.03rem; line-height: 2.05; color: rgba(255,255,255,0.8); white-space: pre-wrap; }
.btn-voltar {
  display: inline-flex; align-items: center; gap: 8px;
  background: none; border: none; color: rgba(255,255,255,0.4); font-size: 0.7rem;
  letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: color 0.2s; margin-top: 3.5rem;
}
.btn-voltar:hover { color: rgba(255,255,255,0.85); }

/* ════════════════════════════
   ARQUIVO
════════════════════════════ */
#arquivo { background: var(--areia); padding-top: 5rem; }
.arquivo-topo { padding: 3rem 1.5rem 2.5rem; text-align: center; }
.arquivo-label {
  font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-soft); margin-bottom: 0.6rem;
}
.arquivo-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(1.5rem, 3vw, 2rem); color: var(--text-dark); margin-bottom: 0.5rem;
}
.arquivo-sub {
  font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-soft);
}
.arquivo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1px; background: #c8c2b4;
}
.arquivo-card {
  position: relative; overflow: hidden; cursor: pointer;
  aspect-ratio: 3/4; background: var(--areia2);
}
.arquivo-card-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center; background-color: #2a2820;
  filter: brightness(0.58); transition: transform 0.4s ease, filter 0.3s;
}
.arquivo-card:hover .arquivo-card-bg { transform: scale(1.04); filter: brightness(0.46); }
.arquivo-card-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2rem 1.1rem 1.1rem;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent); color: #fff;
}
.arquivo-semana-num { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.55; }
.arquivo-card-titulo {
  font-family: var(--serif); font-style: italic; font-size: 1.05rem; margin-top: 0.3rem; line-height: 1.3;
}

/* ════════════════════════════
   MENSAGEM
════════════════════════════ */
#mensagem {
  background: #0c0c0a; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 5rem 1.5rem;
}
.msg-box { max-width: 500px; width: 100%; }
.msg-titulo {
  font-family: var(--serif); font-style: italic;
  font-size: clamp(1.5rem, 4vw, 1.9rem); color: rgba(255,255,255,0.88); margin-bottom: 0.5rem;
}
.msg-sub { font-size: 0.76rem; color: rgba(255,255,255,0.3); letter-spacing: 0.07em; margin-bottom: 2.5rem; }
.msg-textarea {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.82); padding: 1.2rem;
  font-size: 1rem; font-family: var(--serif); font-style: italic;
  line-height: 1.75; resize: none; height: 155px; border-radius: 2px; outline: none; transition: border-color 0.2s;
}
.msg-textarea:focus { border-color: rgba(255,255,255,0.26); }
.msg-textarea::placeholder { color: rgba(255,255,255,0.17); }
.msg-count { text-align: right; font-size: 0.68rem; color: rgba(255,255,255,0.2); margin-top: 0.4rem; }
.btn-enviar {
  margin-top: 1.5rem; width: 100%; padding: 0.88rem;
  background: transparent; border: 1px solid rgba(255,255,255,0.26);
  color: rgba(255,255,255,0.6); font-size: 0.72rem;
  letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.25s;
}
.btn-enviar:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.52); }
.msg-ok { display: none; text-align: center; padding: 2.5rem 0; }
.msg-ok p {
  font-family: var(--serif); font-style: italic;
  font-size: 1.1rem; color: rgba(255,255,255,0.62); line-height: 1.85;
}

/* ════════════════════════════
   MODAL AUTH (leitores)
════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 1.5rem;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--areia); max-width: 380px; width: 100%;
  padding: 2.8rem 2.2rem 2.4rem; position: relative;
  animation: modalIn 0.28s ease;
}
@keyframes modalIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.modal-fechar {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; color: var(--text-soft);
  font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 0.2rem;
}
.modal-fechar:hover { color: var(--text-dark); }

.modal-logo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.5rem; color: var(--text-dark);
  text-align: center; margin-bottom: 0.3rem;
}
.modal-sub {
  font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-soft); text-align: center; margin-bottom: 2rem;
}

/* tabs */
.modal-tabs {
  display: flex; border-bottom: 1px solid #ddd8cc; margin-bottom: 1.8rem;
}
.modal-tab {
  flex: 1; padding: 0.5rem; background: none; border: none;
  font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-soft); cursor: pointer; transition: color 0.2s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.modal-tab.ativo { color: var(--text-dark); border-bottom-color: var(--text-dark); }

.modal-panel { display: none; }
.modal-panel.ativo { display: block; }

/* campos */
.auth-campo { margin-bottom: 1rem; }
.auth-campo input {
  width: 100%; background: #fff; border: 1px solid #ddd8cc;
  color: var(--text-dark); padding: 0.75rem 1rem; font-size: 0.92rem;
  border-radius: 2px; outline: none; transition: border-color 0.2s;
}
.auth-campo input:focus { border-color: #aaa090; }
.auth-campo input::placeholder { color: #bbb; }

.btn-auth {
  width: 100%; padding: 0.82rem; background: var(--text-dark); color: #fff;
  border: none; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: opacity 0.2s; margin-top: 0.5rem;
}
.btn-auth:hover { opacity: 0.82; }

/* divisor */
.auth-ou {
  display: flex; align-items: center; gap: 0.8rem;
  margin: 1.4rem 0; color: var(--text-soft); font-size: 0.68rem;
  letter-spacing: 0.12em; text-transform: uppercase;
}
.auth-ou::before, .auth-ou::after { content: ''; flex: 1; height: 1px; background: #ddd8cc; }

/* botão Google */
.btn-google {
  width: 100%; padding: 0.78rem; background: #fff;
  border: 1px solid #ddd8cc; color: var(--text-dark);
  font-size: 0.72rem; letter-spacing: 0.08em; text-transform: none;
  cursor: pointer; border-radius: 2px; transition: border-color 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-google:hover { border-color: #aaa090; }
.btn-google svg { flex-shrink: 0; }

.auth-msg {
  font-size: 0.74rem; text-align: center; margin-top: 1rem; line-height: 1.6;
  min-height: 1.2em;
}
.auth-msg.ok { color: #4a7a5a; }
.auth-msg.err { color: #a05040; }

/* estado logado no modal */
.auth-logado { text-align: center; }
.auth-logado-email {
  font-size: 0.8rem; color: var(--text-soft); margin-bottom: 1.5rem; word-break: break-all;
}
.auth-logado-nome {
  font-family: var(--serif); font-style: italic;
  font-size: 1.1rem; color: var(--text-dark); margin-bottom: 0.4rem;
}
.btn-sair {
  background: none; border: 1px solid #ddd8cc; color: var(--text-soft);
  font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.6rem 1.4rem; cursor: pointer; border-radius: 2px; transition: all 0.2s;
}
.btn-sair:hover { border-color: #aaa090; color: var(--text-dark); }

/* ════════════════════════════
   RODAPÉ
════════════════════════════ */
footer {
  background: #0c0c0a; padding: 2rem 1.5rem; text-align: center;
  border-top: 1px solid rgba(255,255,255,0.05);
}
footer span {
  font-family: var(--serif); font-style: italic;
  font-size: 0.85rem; color: rgba(255,255,255,0.18); letter-spacing: 0.08em;
}

/* ════════════════════════════
   LOGIN ADMIN (oculto)
════════════════════════════ */
#view-login {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: var(--areia); align-items: center; justify-content: center; padding: 2rem;
}
#view-login.open { display: flex; }
.login-box { max-width: 300px; width: 100%; text-align: center; }
.login-logo { font-family: var(--serif); font-style: italic; font-size: 1.9rem; color: var(--text-dark); margin-bottom: 0.3rem; }
.login-sub { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 2rem; }
.login-input {
  width: 100%; background: #fff; border: 1px solid #ddd8cc; color: var(--text-dark);
  padding: 0.8rem 1rem; font-size: 1rem; border-radius: 2px; outline: none; text-align: center;
  letter-spacing: 0.25em; margin-bottom: 1rem; transition: border-color 0.2s;
}
.login-input:focus { border-color: #aaa090; }
.btn-entrar {
  width: 100%; padding: 0.8rem; background: var(--text-dark); color: #fff;
  border: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: opacity 0.2s;
}
.btn-entrar:hover { opacity: 0.8; }
.login-erro { font-size: 0.75rem; color: #a05040; margin-top: 0.7rem; display: none; }

/* ════════════════════════════
   ADMIN (oculto)
════════════════════════════ */
#view-admin { display: none; position: fixed; inset: 0; z-index: 600; background: var(--areia); overflow-y: auto; }
#view-admin.open { display: block; }
.admin-wrap { max-width: 660px; margin: 0 auto; padding: 5.5rem 1.5rem 4rem; }
.admin-logo { font-family: var(--serif); font-style: italic; font-size: 1.5rem; color: var(--text-dark); margin-bottom: 0.2rem; }
.admin-sub { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 2.5rem; }
.campo { margin-bottom: 1.8rem; }
.campo label { display: block; font-size: 0.66rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.5rem; }
.campo input, .campo textarea {
  width: 100%; background: #fff; border: 1px solid #ddd8cc; color: var(--text-dark);
  padding: 0.75rem 1rem; font-size: 0.95rem; font-family: var(--serif); border-radius: 2px; outline: none; transition: border-color 0.2s;
}
.campo input:focus, .campo textarea:focus { border-color: #aaa090; }
.campo textarea { resize: vertical; min-height: 175px; line-height: 1.7; }
.file-label {
  display: flex; align-items: center; gap: 10px;
  border: 1px dashed #c5bdb0; padding: 0.9rem 1.1rem; cursor: pointer;
  color: var(--text-soft); font-size: 0.78rem; border-radius: 2px; background: #fff; transition: border-color 0.2s;
}
.file-label:hover { border-color: #a09888; }
.file-label input { display: none; }
.preview-img, .preview-vid { margin-top: 0.75rem; width: 100%; max-height: 145px; object-fit: cover; border-radius: 2px; display: none; }
.btn-publicar {
  width: 100%; padding: 0.9rem; background: var(--text-dark); color: #fff;
  border: none; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: opacity 0.2s;
}
.btn-publicar:hover { opacity: 0.8; }
.admin-status { font-size: 0.78rem; margin-top: 0.75rem; }
.ok  { color: #4a7a5a; }
.err { color: #a05040; }
hr.sep { border: none; border-top: 1px solid #ddd8cc; margin: 2.5rem 0; }
.msgs-titulo { font-size: 0.66rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 1rem; }
.msg-card { background: #fff; border: 1px solid #e5dfd5; border-radius: 2px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; position: relative; }
.msg-card.nova { border-left: 3px solid #8a7a60; }
.msg-card-txt { font-family: var(--serif); font-style: italic; font-size: 0.92rem; color: var(--text-dark); line-height: 1.7; margin-bottom: 0.35rem; }
.msg-card-data { font-size: 0.66rem; color: var(--text-soft); }
.btn-del { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; color: #ccc8c0; cursor: pointer; font-size: 1rem; line-height: 1; transition: color 0.2s; }
.btn-del:hover { color: #999; }
.sem-msgs { font-size: 0.82rem; color: var(--text-soft); font-style: italic; }

/* ════════════════════════════
   MOBILE
════════════════════════════ */
@media (max-width: 600px) {
  nav { padding: 1rem 1.2rem; }
  .btn-som { font-size: 0.6rem; padding: 0.42rem 0.8rem; left: 1rem; bottom: 1rem; }
  .semanas-nav { right: 0.6rem; }
  .arquivo-grid { grid-template-columns: repeat(2, 1fr); }
  .leitura-corpo { padding: 6rem 1.2rem 4rem; }
  .modal { padding: 2.2rem 1.5rem 2rem; }
}
</style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav id="nav">
  <a class="logo" href="#hero">respiro</a>
  <button class="nav-conta" id="nav-conta-btn" onclick="abrirModalAuth()">entrar</button>
</nav>

<!-- ══════════ HERO ══════════ -->
<section id="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-veil"></div>
  <div class="hero-content">
    <p class="hero-semana" id="hero-semana"></p>
    <h1 class="hero-titulo" id="hero-titulo"></h1>
    <p class="hero-trecho" id="hero-trecho"></p>
    <button class="btn-ler" onclick="abrirLeitura()">ler o texto completo</button>
  </div>
  <div class="semanas-nav" id="semanas-nav"></div>
  <button class="btn-som" id="btn-som" onclick="toggleSom()">som ambiente</button>
  <div class="hero-scroll-hint" onclick="document.getElementById('arquivo').scrollIntoView({behavior:'smooth'})">
    <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 2 L8 16 M3 12 L8 17 L13 12"/>
    </svg>
  </div>
</section>

<!-- ══════════ ARQUIVO ══════════ -->
<section id="arquivo">
  <div class="arquivo-topo">
    <div class="arquivo-label">respiro</div>
    <div class="arquivo-titulo">arquivo</div>
    <div class="arquivo-sub">todos os textos</div>

<script>
/* ══════════════════════════════════════════

const SUPABASE_URL  = 'https://ebshabfpludkiaecztsg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_gkZ5BNRydouTISFNCz7v8A_Bhbwvgj_';

/* ── init Supabase ── */
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ════════════════════════════
   CONFIG ADMIN
════════════════════════════ */
const SENHA_ADMIN = 'rprpormim1998';

/* ════════════════════════════
   DADOS / STORAGE LOCAL
════════════════════════════ */
const PADRAO = [
  { id:1, semana:'01', ano:'2025',
    titulo:'o peso das coisas leves',
    texto:'Há coisas que não pesam nada e ainda assim nos curvam.\n\nComo uma palavra dita de passagem que ficou. Como a luz de uma tarde específica que nunca mais voltou exatamente assim. Como o cheiro de uma pessoa que já foi.\n\nEu penso nisso às vezes — no que nos curva sem nos quebrar. No que fica no corpo como memória que não escolhemos guardar.\n\nTalvez seja isso: que o leve pode ser o mais permanente de tudo.',

    midia:'', tipo:'image' }
];

let idx = 0, adminLogado = false;
let audioCtx = null, somLigado = false, somNos = {};

function textos() {
  try { const s = localStorage.getItem('r_textos'); return s ? JSON.parse(s) : PADRAO; } catch(e) { return PADRAO; }
}
function salvarTextos(t) { try { localStorage.setItem('r_textos', JSON.stringify(t)); } catch(e){} }
function mensagens() {
  try { const s = localStorage.getItem('r_msgs'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
}
function salvarMensagens(m) { try { localStorage.setItem('r_msgs', JSON.stringify(m)); } catch(e){} }

/* ════════════════════════════
   AUTH — leitores
════════════════════════════ */
let usuarioAtual = null;

/* escuta mudanças de sessão */
sb.auth.onAuthStateChange(function(event, session) {
  usuarioAtual = session ? session.user : null;
  atualizarNavConta();
  if (event === 'SIGNED_IN') {
    fecharModalAuth();
  }
});

function atualizarNavConta() {
  const btn = document.getElementById('nav-conta-btn');
  if (usuarioAtual) {
    const nome = usuarioAtual.user_metadata && usuarioAtual.user_metadata.full_name
      ? usuarioAtual.user_metadata.full_name.split(' ')[0]
      : usuarioAtual.email.split('@')[0];
    btn.textContent = nome;
    btn.classList.add('logado');
  } else {
    btn.textContent = 'entrar';
    btn.classList.remove('logado');
  }
}

function abrirModalAuth() {
  const overlay = document.getElementById('modal-auth');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (usuarioAtual) {
    /* mostrar estado logado */
    document.getElementById('auth-deslogado').style.display = 'none';
    document.getElementById('auth-logado').style.display = 'block';
    const nome = usuarioAtual.user_metadata && usuarioAtual.user_metadata.full_name
      ? usuarioAtual.user_metadata.full_name
      : '';
    document.getElementById('auth-nome-exibido').textContent = nome || '';
    document.getElementById('auth-email-exibido').textContent = usuarioAtual.email;
    document.getElementById('modal-sub-texto').textContent = 'sua conta';
  } else {
    document.getElementById('auth-deslogado').style.display = 'block';
    document.getElementById('auth-logado').style.display = 'none';
    document.getElementById('modal-sub-texto').textContent = 'faça parte';
  }
}

function fecharModalAuth() {
  document.getElementById('modal-auth').classList.remove('open');
  document.body.style.overflow = '';
}

function fecharModalAuthFora(e) {
  if (e.target === document.getElementById('modal-auth')) fecharModalAuth();
}

function trocarTab(tab) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('ativo'));
  document.querySelectorAll('.modal-panel').forEach(p => p.classList.remove('ativo'));
  document.getElementById('tab-' + tab).classList.add('ativo');
  document.getElementById('panel-' + tab).classList.add('ativo');
}

async function loginEmail() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha-leitor').value;
  const msg = document.getElementById('msg-entrar');
  if (!email || !senha) { msg.textContent = 'preencha email e senha.'; msg.className = 'auth-msg err'; return; }
  msg.textContent = '...'; msg.className = 'auth-msg';
  const { error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    msg.textContent = 'email ou senha incorretos.'; msg.className = 'auth-msg err';
  } else {
    msg.textContent = ''; 
  }
}

async function criarConta() {
  const nome  = document.getElementById('criar-nome').value.trim();
  const email = document.getElementById('criar-email').value.trim();
  const senha = document.getElementById('criar-senha').value;
  const msg   = document.getElementById('msg-criar');
  if (!email || !senha) { msg.textContent = 'preencha email e senha.'; msg.className = 'auth-msg err'; return; }
  if (senha.length < 6)  { msg.textContent = 'senha precisa ter ao menos 6 caracteres.'; msg.className = 'auth-msg err'; return; }
  msg.textContent = '...'; msg.className = 'auth-msg';
  const { error } = await sb.auth.signUp({
    email, password: senha,
    options: { data: { full_name: nome } }
  });
  if (error) {
    msg.textContent = 'não foi possível criar a conta. tente outro email.'; msg.className = 'auth-msg err';
  } else {
    msg.textContent = 'conta criada! verifique seu email para confirmar.'; msg.className = 'auth-msg ok';
  }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function sairConta() {
  await sb.auth.signOut();
  fecharModalAuth();
}

/* ════════════════════════════
   HERO
════════════════════════════ */
function renderHero() {
  const ts = textos();
  if (!ts.length) return;
  idx = Math.min(idx, ts.length - 1);
  mostrar(idx);
  const nav = document.getElementById('semanas-nav');
  nav.innerHTML = '';
  ts.forEach(function(_, i) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    d.onclick = function() { idx = i; mostrar(i); };
    nav.appendChild(d);
  });
}

function mostrar(i) {
  const ts = textos(), t = ts[i];
  document.getElementById('hero-semana').textContent = 'semana ' + t.semana + ' · ' + t.ano;
  document.getElementById('hero-titulo').textContent = t.titulo;
  const p = t.texto.split('\n\n')[0];
  document.getElementById('hero-trecho').textContent = p.length > 130 ? p.slice(0,130) + '…' : p;
  const bg = document.getElementById('hero-bg');
  bg.style.backgroundImage = (t.midia && t.tipo === 'image') ? "url('" + t.midia + "')" : 'none';
  document.querySelectorAll('.dot').forEach(function(d, j) { d.classList.toggle('active', j === i); });
  idx = i;
}

/* ════════════════════════════
   ARQUIVO
════════════════════════════ */
function renderArquivo() {
  const ts = textos(), grid = document.getElementById('arquivo-grid');
  grid.innerHTML = '';
  ts.forEach(function(t, i) {
    const c = document.createElement('div');
    c.className = 'arquivo-card';
    const bg = (t.midia && t.tipo === 'image')
      ? "background-image:url('" + t.midia + "');background-color:#2a2820;"
      : "background-color:#2a2820;";
    c.innerHTML =
      '<div class="arquivo-card-bg" style="' + bg + '"></div>' +
      '<div class="arquivo-card-info">' +
        '<div class="arquivo-semana-num">semana ' + t.semana + '</div>' +
        '<div class="arquivo-card-titulo">' + esc(t.titulo) + '</div>' +
      '</div>';
    c.onclick = function() { idx = i; abrirLeitura(); };
    grid.appendChild(c);
  });
}

/* ════════════════════════════
   LEITURA
════════════════════════════ */
function abrirLeitura() {
  const ts = textos(), t = ts[idx];
  document.getElementById('leitura-semana').textContent = 'semana ' + t.semana + ' · ' + t.ano;
  document.getElementById('leitura-titulo').textContent = t.titulo;
  document.getElementById('leitura-texto').textContent = t.texto;
  const bg = document.getElementById('leitura-bg');
  bg.style.backgroundImage = (t.midia && t.tipo === 'image') ? "url('" + t.midia + "')" : 'none';
  document.getElementById('view-leitura').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('view-leitura').scrollTop = 0;
}

function fecharLeitura() {
  document.getElementById('view-leitura').classList.remove('open');
  document.body.style.overflow = '';
}

/* ════════════════════════════
   MENSAGEM
════════════════════════════ */
function contarChars() {
  document.getElementById('msg-chars').textContent = document.getElementById('msg-input').value.length;
}
function enviar() {
  const txt = document.getElementById('msg-input').value.trim();
  if (!txt) return;
  const ms = mensagens();
  ms.unshift({ texto: txt, data: new Date().toLocaleDateString('pt-BR'), nova: true });
  salvarMensagens(ms);
  document.getElementById('msg-form').style.display = 'none';
  document.getElementById('msg-ok').style.display = 'block';
}

/* ════════════════════════════
   ADMIN
════════════════════════════ */
function loginAdmin() {
  const s = document.getElementById('login-senha').value;
  if (s === SENHA_ADMIN) {
    adminLogado = true;
    document.getElementById('login-erro').style.display = 'none';
    document.getElementById('login-senha').value = '';
    document.getElementById('view-login').classList.remove('open');
    document.getElementById('view-admin').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderAdmin();
  } else {
    document.getElementById('login-erro').style.display = 'block';
  }
}

function fecharAdmin() {
  adminLogado = false;
  document.getElementById('view-admin').classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', window.location.pathname);
}

function prevMidia(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('a-file-nome').textContent = file.name;
  const img = document.getElementById('prev-img'), vid = document.getElementById('prev-vid');
  const r = new FileReader();
  r.onload = function(e) {
    if (file.type.startsWith('image')) {
      img.src = e.target.result; img.style.display = 'block'; vid.style.display = 'none';
    } else {
      vid.src = e.target.result; vid.style.display = 'block'; vid.play(); img.style.display = 'none';
    }
  };
  r.readAsDataURL(file);
}

function publicar() {
  const titulo = document.getElementById('a-titulo').value.trim();
  const texto  = document.getElementById('a-texto').value.trim();
  const sem    = document.getElementById('a-semana').value.trim();
  const fi     = document.getElementById('a-midia');
  const st     = document.getElementById('a-status');
  if (!titulo || !texto || !sem) { st.textContent = 'preencha título, texto e semana.'; st.className = 'admin-status err'; return; }

  function salvar(midia, tipo) {
    const ts = textos();
    ts.unshift({ id: Date.now(), semana: sem.padStart(2,'0'), ano: new Date().getFullYear().toString(), titulo, texto, midia, tipo });
    salvarTextos(ts); idx = 0;
    ['a-titulo','a-texto','a-semana'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('a-file-nome').textContent = 'escolher arquivo...';
    document.getElementById('prev-img').style.display = 'none';
    document.getElementById('prev-vid').style.display = 'none';
    fi.value = '';
    st.textContent = '✓ publicado com sucesso.'; st.className = 'admin-status ok';
    renderHero(); renderArquivo(); renderAdmin();
  }

  if (fi.files[0]) {
    const file = fi.files[0];
    if (file.size > 4*1024*1024) { st.textContent = 'arquivo muito grande (máx 4 MB).'; st.className = 'admin-status err'; return; }
    const tipo = file.type.startsWith('image') ? 'image' : 'video';
    const r = new FileReader();
    r.onload = function(e) { salvar(e.target.result, tipo); };
    r.readAsDataURL(file);
  } else { salvar('', 'image'); }
}

function renderAdmin() {
  const ms = mensagens(), c = document.getElementById('a-msgs');
  if (!ms.length) { c.innerHTML = '<p class="sem-msgs">nenhuma mensagem ainda.</p>'; return; }
  c.innerHTML = ms.map(function(m, i) {
    return '<div class="msg-card ' + (m.nova?'nova':'') + '">' +
      '<p class="msg-card-txt">"' + esc(m.texto) + '"</p>' +
      '<p class="msg-card-data">' + m.data + '</p>' +
      '<button class="btn-del" onclick="delMsg(' + i + ')">&#215;</button></div>';
  }).join('');
  ms.forEach(function(m) { m.nova = false; }); salvarMensagens(ms);
}

function delMsg(i) {
  const ms = mensagens(); ms.splice(i,1); salvarMensagens(ms); renderAdmin();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════
   HASH ROUTING (admin)
════════════════════════════ */
function rotear() {
  if (window.location.hash === '#admin') {
    if (adminLogado) {
      document.getElementById('view-admin').classList.add('open');
      document.body.style.overflow = 'hidden';
      renderAdmin();
    } else {
      document.getElementById('view-login').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
  }
}

/* ════════════════════════════
   SOM
════════════════════════════ */
function criarSom() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = audioCtx, now = ctx.currentTime;
  const bufSz = 4 * ctx.sampleRate;
  const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i=0; i<bufSz; i++) {
    const w = Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
  }
  const vSrc = ctx.createBufferSource(); vSrc.buffer = buf; vSrc.loop = true;
  const vFilt = ctx.createBiquadFilter(); vFilt.type='bandpass'; vFilt.frequency.value=180; vFilt.Q.value=0.5;
  const vGain = ctx.createGain(); vGain.gain.setValueAtTime(0,now); vGain.gain.linearRampToValueAtTime(0.5,now+4);
  const vLFO = ctx.createOscillator(); vLFO.type='sine'; vLFO.frequency.value=0.05;
  const vLG = ctx.createGain(); vLG.gain.value=0.16;
  vLFO.connect(vLG); vLG.connect(vGain.gain); vLFO.start();
  vSrc.connect(vFilt); vFilt.connect(vGain);
  const bF = ctx.createBuffer(1, bufSz, ctx.sampleRate);
  const dF = bF.getChannelData(0);
  for (let i=0; i<bufSz; i++) dF[i]=Math.random()*2-1;
  const fSrc = ctx.createBufferSource(); fSrc.buffer=bF; fSrc.loop=true;
  const fFilt = ctx.createBiquadFilter(); fFilt.type='highpass'; fFilt.frequency.value=4200; fFilt.Q.value=0.3;
  const fGain = ctx.createGain(); fGain.gain.setValueAtTime(0,now); fGain.gain.linearRampToValueAtTime(0.035,now+5);
  const fLFO = ctx.createOscillator(); fLFO.type='sine'; fLFO.frequency.value=0.11;
  const fLG = ctx.createGain(); fLG.gain.value=0.025;
  fLFO.connect(fLG); fLG.connect(fGain.gain); fLFO.start();
  fSrc.connect(fFilt); fFilt.connect(fGain);
  const gOsc = ctx.createOscillator(); gOsc.type='sine'; gOsc.frequency.value=4200;
  const gGain = ctx.createGain(); gGain.gain.setValueAtTime(0,now); gGain.gain.linearRampToValueAtTime(0.015,now+6);
  const gTrem = ctx.createOscillator(); gTrem.type='sine'; gTrem.frequency.value=16;
  const gTG = ctx.createGain(); gTG.gain.value=0.012;
  gTrem.connect(gTG); gTG.connect(gGain.gain); gTrem.start();
  const gPulso = ctx.createOscillator(); gPulso.type='sine'; gPulso.frequency.value=0.07;
  const gPG = ctx.createGain(); gPG.gain.value=0.01;
  gPulso.connect(gPG); gPG.connect(gGain.gain); gPulso.start();
  gOsc.connect(gGain);
  const master = ctx.createGain(); master.gain.value=0.36;
  vGain.connect(master); fGain.connect(master); gGain.connect(master);
  master.connect(ctx.destination);
  vSrc.start(); fSrc.start(); gOsc.start();
  somNos = { srcs:[vSrc,fSrc,gOsc], lfos:[vLFO,fLFO,gTrem,gPulso], master };
}

function pararSom() {
  if (!somNos.master) return;
  somNos.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime+2.5);
  setTimeout(function() {
    try { somNos.srcs.forEach(function(s){s.stop();}); somNos.lfos.forEach(function(l){l.stop();}); } catch(e){}
    somNos = {};
  }, 3000);
}

function toggleSom() {
  somLigado = !somLigado;
  const btn = document.getElementById('btn-som');
  if (somLigado) { criarSom(); btn.innerHTML = '<span class="som-dot"></span>som ambiente'; btn.classList.add('on'); }
  else { pararSom(); btn.innerHTML = 'som ambiente'; btn.classList.remove('on'); }
}
