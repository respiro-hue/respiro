<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>respiro</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --serif: Georgia, 'Times New Roman', serif;
  --sans: system-ui, -apple-system, sans-serif;
  --areia: #f5f0e8;
  --areia2: #ede7d8;
  --text-dark: #1a1a18;
  --text-soft: #8a8a80;
}

html { scroll-behavior: smooth; }

body {
  width: 100%;
  font-family: var(--sans);
  background: #111;
  overflow-x: hidden;
}

/* ══ NAV ══ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.4rem 2.5rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
  pointer-events: none;
}
nav * { pointer-events: all; }
.logo {
  font-family: var(--serif); font-style: italic;
  font-size: 1.45rem; color: #fff; cursor: pointer;
  letter-spacing: 0.02em; text-decoration: none;
}
.logo:hover { opacity: 0.75; }

/* ══ HERO ══ */
#hero {
  position: relative; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background-color: #151910;
  background-size: cover; background-position: center;
  filter: blur(8px) brightness(0.42);
  transform: scale(1.06);
  transition: background-image 0.9s ease;
}
.hero-veil { position: absolute; inset: 0; z-index: 1; background: rgba(0,0,0,0.32); }
.hero-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  max-width: 660px; padding: 0 1.5rem; width: 100%;
}
.hero-semana {
  font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.48); margin-bottom: 1.6rem;
}
.hero-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  color: #fff; line-height: 1.18; margin-bottom: 1.6rem;
}
.hero-trecho {
  font-size: clamp(0.88rem, 2vw, 1rem);
  color: rgba(255,255,255,0.68); line-height: 1.9;
  font-style: italic; margin-bottom: 2.8rem; max-width: 520px;
}
.btn-ler {
  padding: 0.78rem 2.8rem;
  border: 1px solid rgba(255,255,255,0.42); color: #fff;
  font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  background: transparent; cursor: pointer;
  transition: background 0.25s, border-color 0.25s;
}
.btn-ler:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.75); }

/* dots semanas */
.semanas-nav {
  position: fixed; right: 1.4rem; top: 50%; transform: translateY(-50%);
  z-index: 150; display: flex; flex-direction: column; gap: 10px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.28); cursor: pointer; transition: all 0.22s;
}
.dot.active { background: #fff; transform: scale(1.5); }

/* ══ BOTÃO SOM ══ */
.btn-som {
  position: fixed; bottom: 1.6rem; left: 1.6rem; z-index: 150;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.65); font-size: 0.66rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 0.48rem 1rem; cursor: pointer; transition: all 0.22s; border-radius: 2px;
  display: flex; align-items: center; gap: 7px;
}
.btn-som:hover { background: rgba(255,255,255,0.16); color: #fff; }
.btn-som.on { color: #fff; border-color: rgba(255,255,255,0.5); }

@keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:1} }
.som-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: #7abf8a;
  animation: pulse 1.6s ease infinite;
}

/* ══ MENU DE SONS ══ */
.som-menu {
  position: fixed; bottom: 4.2rem; left: 1.6rem; z-index: 149;
  background: rgba(10,10,8,0.92); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 3px; padding: 0.5rem 0;
  min-width: 185px;
  display: none; flex-direction: column;
  backdrop-filter: blur(8px);
  animation: menuUp 0.18s ease;
}
@keyframes menuUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.som-menu.open { display: flex; }

.som-opcao {
  display: flex; align-items: center; gap: 10px;
  padding: 0.55rem 1rem; background: none; border: none;
  color: rgba(255,255,255,0.55); font-size: 0.66rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: color 0.15s; text-align: left; width: 100%;
}
.som-opcao:hover { color: rgba(255,255,255,0.9); }
.som-opcao.ativo { color: #fff; }
.som-opcao .opcao-icon { font-size: 0.95rem; flex-shrink: 0; width: 18px; text-align: center; }
.som-opcao .opcao-barra {
  margin-left: auto; display: flex; gap: 2px; align-items: flex-end; height: 12px;
}
.som-opcao.ativo .opcao-barra span {
  display: block; width: 3px; background: #7abf8a; border-radius: 1px;
  animation: barUp 0.9s ease infinite alternate;
}
.som-opcao.ativo .opcao-barra span:nth-child(1){ height: 5px; animation-delay: 0s; }
.som-opcao.ativo .opcao-barra span:nth-child(2){ height: 9px; animation-delay: 0.2s; }
.som-opcao.ativo .opcao-barra span:nth-child(3){ height: 6px; animation-delay: 0.4s; }
@keyframes barUp { from{transform:scaleY(0.4)} to{transform:scaleY(1)} }

.som-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 0.35rem 0; }

/* seta scroll */
.hero-scroll-hint {
  position: absolute; bottom: 2.2rem; left: 50%; transform: translateX(-50%);
  z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: rgba(255,255,255,0.3); font-size: 0.6rem; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer;
  animation: fadeHint 3s ease 2s both;
}
@keyframes fadeHint { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.hero-scroll-hint svg { animation: bounce 2s ease infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

/* ══ LEITURA (overlay) ══ */
#view-leitura {
  display: none; position: fixed; inset: 0; z-index: 300; overflow-y: auto;
}
#view-leitura.open { display: block; }

/* barra de navegação fixa dentro da leitura */
.leitura-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 310;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 2rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.leitura-nav-btn {
  background: none; border: none; color: rgba(255,255,255,0.45);
  font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s;
  display: flex; align-items: center; gap: 7px; padding: 0.3rem 0;
}
.leitura-nav-btn:hover { color: rgba(255,255,255,0.9); }
.leitura-nav-btn.disabled { opacity: 0.2; pointer-events: none; }
.leitura-nav-center {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.28); font-family: var(--serif); font-style: italic;
}

.leitura-bg {
  position: fixed; inset: 0; z-index: 0; background-color: #111;
  background-size: cover; background-position: center;
  filter: blur(14px) brightness(0.3); transform: scale(1.1);
  transition: background-image 0.7s ease;
}
.leitura-veil { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.52); }
.leitura-corpo {
  position: relative; z-index: 2; max-width: 560px; margin: 0 auto;
  padding: 7.5rem 1.5rem 8rem;
}
.leitura-semana {
  font-size: 0.66rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 1rem;
}
.leitura-titulo {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(1.7rem, 4vw, 2.8rem); color: #fff; line-height: 1.22; margin-bottom: 2.8rem;
}
.leitura-sep { width: 36px; height: 1px; background: rgba(255,255,255,0.2); margin-bottom: 2.8rem; }
.leitura-texto { font-size: 1.03rem; line-height: 2.05; color: rgba(255,255,255,0.8); white-space: pre-wrap; }

/* navegação rodapé da leitura */
.leitura-rodape {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 4rem; padding-top: 2rem;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.leitura-rodape-btn {
  background: none; border: none; color: rgba(255,255,255,0.35); font-size: 0.68rem;
  letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
  transition: color 0.2s; display: flex; align-items: center; gap: 8px;
  font-family: var(--sans);
}
.leitura-rodape-btn:hover { color: rgba(255,255,255,0.8); }
.leitura-rodape-btn.disabled { opacity: 0.18; pointer-events: none; }
.leitura-rodape-fechar {
  background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.45);
  font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 0.5rem 1.2rem; cursor: pointer; border-radius: 2px; transition: all 0.2s;
  font-family: var(--sans);
}
.leitura-rodape-fechar:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

/* ══ ARQUIVO ══ */
#arquivo { background: var(--areia); padding-top: 5rem; }
.arquivo-topo { padding: 3rem 1.5rem 2.5rem; text-align: center; }
.arquivo-label { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.6rem; }
.arquivo-titulo { font-family: var(--serif); font-style: italic; font-weight: 400; font-size: clamp(1.5rem, 3vw, 2rem); color: var(--text-dark); margin-bottom: 0.5rem; }
.arquivo-sub { font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-soft); }
.arquivo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: #c8c2b4; }
.arquivo-card { position: relative; overflow: hidden; cursor: pointer; aspect-ratio: 3/4; background: var(--areia2); }
.arquivo-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; background-color: #2a2820; filter: brightness(0.58); transition: transform 0.4s ease, filter 0.3s; }
.arquivo-card:hover .arquivo-card-bg { transform: scale(1.04); filter: brightness(0.46); }
.arquivo-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 1.1rem 1.1rem; background: linear-gradient(to top, rgba(0,0,0,0.75), transparent); color: #fff; }
.arquivo-semana-num { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.55; }
.arquivo-card-titulo { font-family: var(--serif); font-style: italic; font-size: 1.05rem; margin-top: 0.3rem; line-height: 1.3; }

/* ══ MENSAGEM ══ */
#mensagem { background: #0c0c0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 5rem 1.5rem; }
.msg-box { max-width: 500px; width: 100%; }
.msg-titulo { font-family: var(--serif); font-style: italic; font-size: clamp(1.5rem, 4vw, 1.9rem); color: rgba(255,255,255,0.88); margin-bottom: 0.5rem; }
.msg-sub { font-size: 0.76rem; color: rgba(255,255,255,0.3); letter-spacing: 0.07em; margin-bottom: 2.5rem; }
.msg-textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.82); padding: 1.2rem; font-size: 1rem; font-family: var(--serif); font-style: italic; line-height: 1.75; resize: none; height: 155px; border-radius: 2px; outline: none; transition: border-color 0.2s; }
.msg-textarea:focus { border-color: rgba(255,255,255,0.26); }
.msg-textarea::placeholder { color: rgba(255,255,255,0.17); }
.msg-count { text-align: right; font-size: 0.68rem; color: rgba(255,255,255,0.2); margin-top: 0.4rem; }
.btn-enviar { margin-top: 1.5rem; width: 100%; padding: 0.88rem; background: transparent; border: 1px solid rgba(255,255,255,0.26); color: rgba(255,255,255,0.6); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; }
.btn-enviar:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.52); }
.msg-ok { display: none; text-align: center; padding: 2.5rem 0; }
.msg-ok p { font-family: var(--serif); font-style: italic; font-size: 1.1rem; color: rgba(255,255,255,0.62); line-height: 1.85; }

/* ══ RODAPÉ ══ */
footer { background: #0c0c0a; padding: 2rem 1.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
footer span { font-family: var(--serif); font-style: italic; font-size: 0.85rem; color: rgba(255,255,255,0.18); letter-spacing: 0.08em; }

/* ══ LOGIN ADMIN (oculto) ══ */
#view-login { display: none; position: fixed; inset: 0; z-index: 600; background: var(--areia); align-items: center; justify-content: center; padding: 2rem; }
#view-login.open { display: flex; }
.login-box { max-width: 300px; width: 100%; text-align: center; }
.login-logo { font-family: var(--serif); font-style: italic; font-size: 1.9rem; color: var(--text-dark); margin-bottom: 0.3rem; }
.login-sub { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 2rem; }
.login-input { width: 100%; background: #fff; border: 1px solid #ddd8cc; color: var(--text-dark); padding: 0.8rem 1rem; font-size: 1rem; border-radius: 2px; outline: none; text-align: center; letter-spacing: 0.25em; margin-bottom: 1rem; transition: border-color 0.2s; }
.login-input:focus { border-color: #aaa090; }
.btn-entrar { width: 100%; padding: 0.8rem; background: var(--text-dark); color: #fff; border: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: opacity 0.2s; }
.btn-entrar:hover { opacity: 0.8; }
.login-erro { font-size: 0.75rem; color: #a05040; margin-top: 0.7rem; display: none; }

/* ══ ADMIN (oculto) ══ */
#view-admin { display: none; position: fixed; inset: 0; z-index: 600; background: var(--areia); overflow-y: auto; }
#view-admin.open { display: block; }
.admin-wrap { max-width: 660px; margin: 0 auto; padding: 5.5rem 1.5rem 4rem; }
.admin-logo { font-family: var(--serif); font-style: italic; font-size: 1.5rem; color: var(--text-dark); margin-bottom: 0.2rem; }
.admin-sub { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 2.5rem; }
.campo { margin-bottom: 1.8rem; }
.campo label { display: block; font-size: 0.66rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.5rem; }
.campo input, .campo textarea { width: 100%; background: #fff; border: 1px solid #ddd8cc; color: var(--text-dark); padding: 0.75rem 1rem; font-size: 0.95rem; font-family: var(--serif); border-radius: 2px; outline: none; transition: border-color 0.2s; }
.campo input:focus, .campo textarea:focus { border-color: #aaa090; }
.campo textarea { resize: vertical; min-height: 175px; line-height: 1.7; }
.file-label { display: flex; align-items: center; gap: 10px; border: 1px dashed #c5bdb0; padding: 0.9rem 1.1rem; cursor: pointer; color: var(--text-soft); font-size: 0.78rem; border-radius: 2px; background: #fff; transition: border-color 0.2s; }
.file-label:hover { border-color: #a09888; }
.file-label input { display: none; }
.preview-img, .preview-vid { margin-top: 0.75rem; width: 100%; max-height: 145px; object-fit: cover; border-radius: 2px; display: none; }
.btn-publicar { width: 100%; padding: 0.9rem; background: var(--text-dark); color: #fff; border: none; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: opacity 0.2s; }
.btn-publicar:hover { opacity: 0.8; }
.admin-status { font-size: 0.78rem; margin-top: 0.75rem; }
.ok  { color: #4a7a5a; }
.err { color: #a05040; }
hr.sep { border: none; border-top: 1px solid #ddd8cc; margin: 2.5rem 0; }
.msgs-titulo { font-size: 0.66rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 1rem; }
.msg-card { background: #fff; border: 1px solid #e5dfd5; border-radius: 2px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; position: relative; }
.msg-card.nova { border-left: 3px solid #8a7a60; }
.msg-card-txt { font-family: var(--serif); font-style: italic; font-size: 0.92rem; color: var(--text-dark); line-height: 1.7; margin-bottom: 0.35rem; }
.msg-card-data { font-size: 0.66rem; color: var(--text-soft); }
.btn-del { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; color: #ccc8c0; cursor: pointer; font-size: 1rem; line-height: 1; transition: color 0.2s; }
.btn-del:hover { color: #999; }
.sem-msgs { font-size: 0.82rem; color: var(--text-soft); font-style: italic; }

/* ══ MOBILE ══ */
@media (max-width: 600px) {
  nav { padding: 1rem 1.2rem; }
  .btn-som { font-size: 0.6rem; padding: 0.42rem 0.8rem; left: 1rem; bottom: 1rem; }
  .som-menu { left: 1rem; bottom: 3.8rem; }
  .semanas-nav { right: 0.6rem; }
  .arquivo-grid { grid-template-columns: repeat(2, 1fr); }
  .leitura-corpo { padding: 6rem 1.2rem 6rem; }
  .leitura-nav { padding: 1rem 1.2rem; }
}
</style>
</head>
<body>

<!-- ══ NAV ══ -->
<nav id="nav">
  <a class="logo" href="#hero">respiro</a>
</nav>

<!-- ══ HERO ══ -->
<section id="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-veil"></div>
  <div class="hero-content">
    <p class="hero-semana" id="hero-semana"></p>
    <h1 class="hero-titulo" id="hero-titulo"></h1>
    <p class="hero-trecho" id="hero-trecho"></p>
    <button class="btn-ler" onclick="abrirLeitura(idx)">ler o texto completo</button>
  </div>
  <div class="semanas-nav" id="semanas-nav"></div>
  <button class="btn-som" id="btn-som" onclick="toggleMenuSom()">
    <span id="som-dot-el" style="display:none" class="som-dot"></span>
    <span id="som-label">som ambiente</span>
  </button>
  <div class="som-menu" id="som-menu">
    <button class="som-opcao" id="op-floresta"  onclick="escolherSom('floresta')">
      <span class="opcao-icon">🌿</span> floresta
      <span class="opcao-barra"><span></span><span></span><span></span></span>
    </button>
    <button class="som-opcao" id="op-chuva"    onclick="escolherSom('chuva')">
      <span class="opcao-icon">🌧</span> chuva
      <span class="opcao-barra"><span></span><span></span><span></span></span>
    </button>
    <button class="som-opcao" id="op-mar"      onclick="escolherSom('mar')">
      <span class="opcao-icon">🌊</span> mar
      <span class="opcao-barra"><span></span><span></span><span></span></span>
    </button>
    <button class="som-opcao" id="op-vento"    onclick="escolherSom('vento')">
      <span class="opcao-icon">🍃</span> vento
      <span class="opcao-barra"><span></span><span></span><span></span></span>
    </button>
    <div class="som-sep"></div>
    <button class="som-opcao" id="op-branco"   onclick="escolherSom('branco')">
      <span class="opcao-icon">〰</span> ruído branco
      <span class="opcao-barra"><span></span><span></span><span></span></span>
    </button>
    <button class="som-opcao" id="op-rosa"     onclick="escolherSom('rosa')">
      <span class="opcao-icon">∿</span> ruído rosa
      <span class="opcao-barra"><span></span><span></span><span></span></span>
    </button>
    <div class="som-sep"></div>
    <button class="som-opcao" id="op-desligar" onclick="desligarSom()" style="color:rgba(255,255,255,0.3)">
      <span class="opcao-icon">○</span> desligar
    </button>
  </div>
  <div class="hero-scroll-hint" onclick="document.getElementById('arquivo').scrollIntoView({behavior:'smooth'})">
    <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 2 L8 16 M3 12 L8 17 L13 12"/>
    </svg>
  </div>
</section>

<!-- ══ ARQUIVO ══ -->
<section id="arquivo">
  <div class="arquivo-topo">
    <div class="arquivo-label">respiro</div>
    <div class="arquivo-titulo">arquivo</div>
    <div class="arquivo-sub">todos os textos</div>
  </div>
  <div class="arquivo-grid" id="arquivo-grid"></div>

<script>
/* ══ CONFIG ADMIN ══ */
const SENHA_ADMIN = 'respiro2025';

/* ══ DADOS PADRÃO ══ */
const PADRAO = [

    midia:'', tipo:'image' }
];

let idx = 0, adminLogado = false;

/* ══ STORAGE ══ */
function textos() {

}

function mensagens() {

}
function salvarMensagens(m) { try { localStorage.setItem('r_msgs', JSON.stringify(m)); } catch(e){} }

/* ══ HERO ══ */
function renderHero() {
  const ts = textos();
  if (!ts.length) return;
  idx = Math.min(idx, ts.length - 1);
  mostrar(idx);
  const nav = document.getElementById('semanas-nav');
  nav.innerHTML = '';
  ts.forEach(function(_, i) {
    const d = document.createElement('div');

    d.onclick = function() { idx = i; mostrar(i); };
    nav.appendChild(d);

}

function mostrar(i) {

  document.getElementById('hero-titulo').textContent = t.titulo;

  document.getElementById('hero-bg').style.backgroundImage = (t.midia && t.tipo==='image') ? "url('"+t.midia+"')" : 'none';
  document.querySelectorAll('.dot').forEach(function(d,j){ d.classList.toggle('active', j===i); });
  idx = i;
}

/* ══ ARQUIVO ══ */
function renderArquivo() {
  const ts = textos(), grid = document.getElementById('arquivo-grid');
  grid.innerHTML = '';
  ts.forEach(function(t, i) {
    const c = document.createElement('div');
    c.className = 'arquivo-card';
    const bg = (t.midia && t.tipo==='image') ? "background-image:url('"+t.midia+"');background-color:#2a2820;" : "background-color:#2a2820;";

/* ══ LEITURA ══ */
function abrirLeitura(i) {
  idx = i;
  renderLeitura();
  document.getElementById('view-leitura').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('view-leitura').scrollTop = 0;

function renderLeitura() {
  const ts = textos(), t = ts[idx];
  document.getElementById('leitura-semana').textContent = 'semana ' + t.semana + ' · ' + t.ano;
  document.getElementById('leitura-titulo').textContent = t.titulo;

  const ultimo   = idx === ts.length - 1;
  ['nav-anterior','rodape-anterior'].forEach(function(id){
    document.getElementById(id).classList.toggle('disabled', primeiro);
  });
  ['nav-proximo','rodape-proximo'].forEach(function(id){
    document.getElementById(id).classList.toggle('disabled', ultimo);

function navegarLeitura(direcao) {
  const ts = textos();
  const novo = idx + direcao;
  if (novo < 0 || novo >= ts.length) return;
  idx = novo;
  renderLeitura();
  document.getElementById('view-leitura').scrollTop = 0;

function fecharLeitura() {
  document.getElementById('view-leitura').classList.remove('open');

/* ══ MENSAGEM ══ */
function contarChars() {

}
function enviar() {
  const txt = document.getElementById('msg-input').value.trim();
  if (!txt) return;
  const ms = mensagens();
  ms.unshift({ texto: txt, data: new Date().toLocaleDateString('pt-BR'), nova: true });

  document.getElementById('msg-form').style.display = 'none';
  document.getElementById('msg-ok').style.display = 'block';
}

/* ══════════════════════════════════════════
   SOM AMBIENTE — múltiplos ambientes
══════════════════════════════════════════ */
let audioCtx = null;
let somAtivo = null; /* nome do som atual */
let somNos = {};     /* nós ativos */

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

/* ── gerador de ruído ── */
function criarBuffer(ctx, tipo) {
  const len = 3 * ctx.sampleRate;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  if (tipo === 'branco') {
    for (let i=0; i<len; i++) d[i] = Math.random()*2-1;
  } else {
    /* ruído rosa (Voss-McCartney) */
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i=0; i<len; i++) {
      const w = Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
  }
  return buf;
}

function loopBuf(ctx, buf, gain) {
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  src.connect(gain); src.start();
  return src;
}

/* ── construtores de cada ambiente ── */
const ambientes = {

  floresta: function(ctx, master) {
    const now = ctx.currentTime;
    /* vento suave */
    const bV   = criarBuffer(ctx,'rosa');
    const fV   = ctx.createBiquadFilter(); fV.type='bandpass'; fV.frequency.value=200; fV.Q.value=0.4;
    const gV   = ctx.createGain(); gV.gain.setValueAtTime(0,now); gV.gain.linearRampToValueAtTime(0.38,now+4);
    const sV   = loopBuf(ctx, bV, fV); fV.connect(gV); gV.connect(master);
    /* folhas */
    const bF   = criarBuffer(ctx,'branco');
    const fF   = ctx.createBiquadFilter(); fF.type='highpass'; fF.frequency.value=3800;
    const gF   = ctx.createGain(); gF.gain.setValueAtTime(0,now); gF.gain.linearRampToValueAtTime(0.028,now+5);
    const lfoF = ctx.createOscillator(); lfoF.frequency.value=0.12; lfoF.type='sine';
    const lgF  = ctx.createGain(); lgF.gain.value=0.02;
    lfoF.connect(lgF); lgF.connect(gF.gain); lfoF.start();
    const sF   = loopBuf(ctx, bF, fF); fF.connect(gF); gF.connect(master);
    /* grilos */
    const oG   = ctx.createOscillator(); oG.frequency.value=4100; oG.type='sine';
    const gG   = ctx.createGain(); gG.gain.setValueAtTime(0,now); gG.gain.linearRampToValueAtTime(0.012,now+6);
    const tremG= ctx.createOscillator(); tremG.type='sine'; tremG.frequency.value=18;
    const tgG  = ctx.createGain(); tgG.gain.value=0.01; tremG.connect(tgG); tgG.connect(gG.gain); tremG.start();
    oG.connect(gG); gG.connect(master); oG.start();
    return { srcs:[sV,sF], oscs:[oG,lfoF,tremG] };
  },

  chuva: function(ctx, master) {
    const now = ctx.currentTime;
    /* corpo da chuva */
    const bR  = criarBuffer(ctx,'branco');
    const fR  = ctx.createBiquadFilter(); fR.type='bandpass'; fR.frequency.value=1400; fR.Q.value=0.6;
    const gR  = ctx.createGain(); gR.gain.setValueAtTime(0,now); gR.gain.linearRampToValueAtTime(0.55,now+3);
    const sR  = loopBuf(ctx,bR,fR); fR.connect(gR); gR.connect(master);
    /* gotas graves */
    const bG  = criarBuffer(ctx,'rosa');
    const fG  = ctx.createBiquadFilter(); fG.type='lowpass'; fG.frequency.value=320;
    const gG2 = ctx.createGain(); gG2.gain.setValueAtTime(0,now); gG2.gain.linearRampToValueAtTime(0.32,now+4);
    const sG  = loopBuf(ctx,bG,fG); fG.connect(gG2); gG2.connect(master);
    /* lfo pulsação */
    const lfo = ctx.createOscillator(); lfo.frequency.value=0.07; lfo.type='sine';
    const lg  = ctx.createGain(); lg.gain.value=0.12; lfo.connect(lg); lg.connect(gR.gain); lfo.start();
    return { srcs:[sR,sG], oscs:[lfo] };
  },

  mar: function(ctx, master) {
    const now = ctx.currentTime;
    /* ondas */
    const bW  = criarBuffer(ctx,'rosa');
    const fW  = ctx.createBiquadFilter(); fW.type='lowpass'; fW.frequency.value=700; fW.Q.value=0.8;
    const gW  = ctx.createGain(); gW.gain.setValueAtTime(0,now); gW.gain.linearRampToValueAtTime(0.5,now+4);
    const lfo = ctx.createOscillator(); lfo.frequency.value=0.09; lfo.type='sine';
    const lg  = ctx.createGain(); lg.gain.value=0.25; lfo.connect(lg); lg.connect(gW.gain); lfo.start();
    const sW  = loopBuf(ctx,bW,fW); fW.connect(gW); gW.connect(master);
    /* espuma alta */
    const bE  = criarBuffer(ctx,'branco');
    const fE  = ctx.createBiquadFilter(); fE.type='highpass'; fE.frequency.value=5000;
    const gE  = ctx.createGain(); gE.gain.setValueAtTime(0,now); gE.gain.linearRampToValueAtTime(0.025,now+5);
    const lfo2= ctx.createOscillator(); lfo2.frequency.value=0.11; lfo2.type='sine';
    const lg2 = ctx.createGain(); lg2.gain.value=0.018; lfo2.connect(lg2); lg2.connect(gE.gain); lfo2.start();
    const sE  = loopBuf(ctx,bE,fE); fE.connect(gE); gE.connect(master);
    return { srcs:[sW,sE], oscs:[lfo,lfo2] };
  },

  vento: function(ctx, master) {
    const now = ctx.currentTime;
    /* vento principal */
    const bV  = criarBuffer(ctx,'rosa');
    const fV  = ctx.createBiquadFilter(); fV.type='bandpass'; fV.frequency.value=350; fV.Q.value=0.35;
    const gV  = ctx.createGain(); gV.gain.setValueAtTime(0,now); gV.gain.linearRampToValueAtTime(0.55,now+5);
    const lfo = ctx.createOscillator(); lfo.frequency.value=0.04; lfo.type='sine';
    const lg  = ctx.createGain(); lg.gain.value=0.3; lfo.connect(lg); lg.connect(gV.gain); lfo.start();
    const sV  = loopBuf(ctx,bV,fV); fV.connect(gV); gV.connect(master);
    /* assobio agudo */
    const bA  = criarBuffer(ctx,'branco');
    const fA  = ctx.createBiquadFilter(); fA.type='bandpass'; fA.frequency.value=2200; fA.Q.value=2;
    const gA  = ctx.createGain(); gA.gain.setValueAtTime(0,now); gA.gain.linearRampToValueAtTime(0.04,now+6);
    const lfo2= ctx.createOscillator(); lfo2.frequency.value=0.06; lfo2.type='sine';
    const lg2 = ctx.createGain(); lg2.gain.value=0.03; lfo2.connect(lg2); lg2.connect(gA.gain); lfo2.start();
    const sA  = loopBuf(ctx,bA,fA); fA.connect(gA); gA.connect(master);
    return { srcs:[sV,sA], oscs:[lfo,lfo2] };
  },

  branco: function(ctx, master) {
    const now = ctx.currentTime;
    const b   = criarBuffer(ctx,'branco');
    const g   = ctx.createGain(); g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.3,now+2);
    const s   = loopBuf(ctx,b,g); g.connect(master);
    return { srcs:[s], oscs:[] };
  },

  rosa: function(ctx, master) {
    const now = ctx.currentTime;
    const b   = criarBuffer(ctx,'rosa');
    const g   = ctx.createGain(); g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.4,now+2);
    const s   = loopBuf(ctx,b,g); g.connect(master);
    return { srcs:[s], oscs:[] };
  }
};

function pararSomAtivo(cb) {
  if (!somNos.master) { if(cb) cb(); return; }
  somNos.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.8);
  setTimeout(function() {
    try {
      somNos.srcs.forEach(function(s){ s.stop(); });
      somNos.oscs.forEach(function(o){ o.stop(); });
    } catch(e){}
    somNos = {};
    if(cb) cb();
  }, 2000);
}

function escolherSom(nome) {
  /* fecha o menu */
  document.getElementById('som-menu').classList.remove('open');

  if (somAtivo === nome) {
    desligarSom();
    return;
  }

  pararSomAtivo(function() {
    const ctx    = getCtx();
    const master = ctx.createGain(); master.gain.value = 0.38;
    master.connect(ctx.destination);
    const nos    = ambientes[nome](ctx, master);
    somNos = { master, srcs: nos.srcs, oscs: nos.oscs };
    somAtivo = nome;
    atualizarUISom();
  });
}

function desligarSom() {
  document.getElementById('som-menu').classList.remove('open');
  pararSomAtivo(function() {
    somAtivo = null;
    atualizarUISom();
  });
}

function toggleMenuSom() {
  const menu = document.getElementById('som-menu');
  menu.classList.toggle('open');
}

function atualizarUISom() {
  const btn  = document.getElementById('btn-som');
  const dot  = document.getElementById('som-dot-el');
  const lbl  = document.getElementById('som-label');

  /* limpa todos os ativos */
  document.querySelectorAll('.som-opcao').forEach(function(el){ el.classList.remove('ativo'); });

  if (somAtivo) {
    const nomes = { floresta:'floresta', chuva:'chuva', mar:'mar', vento:'vento', branco:'ruído branco', rosa:'ruído rosa' };
    lbl.textContent = nomes[somAtivo] || somAtivo;
    dot.style.display = 'block';
    btn.classList.add('on');
    const el = document.getElementById('op-'+somAtivo);
    if (el) el.classList.add('ativo');
  } else {
    lbl.textContent = 'som ambiente';
    dot.style.display = 'none';
    btn.classList.remove('on');
  }
}

/* fechar menu ao clicar fora */
document.addEventListener('click', function(e) {
  const menu = document.getElementById('som-menu');
  const btn  = document.getElementById('btn-som');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove('open');
  }
});

/* ══ ADMIN ══ */
function loginAdmin() {
  const s = document.getElementById('login-senha').value;
  if (s === SENHA_ADMIN) {
    adminLogado = true;
    document.getElementById('login-erro').style.display = 'none';
    document.getElementById('login-senha').value = '';
    document.getElementById('view-login').classList.remove('open');
    document.getElementById('view-admin').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderAdmin();
  } else {
    document.getElementById('login-erro').style.display = 'block';
  }
}

function fecharAdmin() {
  adminLogado = false;
  document.getElementById('view-admin').classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', window.location.pathname);
}

function prevMidia(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('a-file-nome').textContent = file.name;
  const img = document.getElementById('prev-img'), vid = document.getElementById('prev-vid');
  const r = new FileReader();
  r.onload = function(e) {
    if (file.type.startsWith('image')) { img.src=e.target.result; img.style.display='block'; vid.style.display='none'; }
    else { vid.src=e.target.result; vid.style.display='block'; vid.play(); img.style.display='none'; }
  };
  r.readAsDataURL(file);
}

function publicar() {
  const titulo = document.getElementById('a-titulo').value.trim();
  const texto  = document.getElementById('a-texto').value.trim();
  const sem    = document.getElementById('a-semana').value.trim();
  const fi     = document.getElementById('a-midia');
  const st     = document.getElementById('a-status');
  if (!titulo||!texto||!sem){ st.textContent='preencha título, texto e semana.'; st.className='admin-status err'; return; }

  function salvar(midia,tipo){
    const ts=textos();
    ts.unshift({id:Date.now(),semana:sem.padStart(2,'0'),ano:new Date().getFullYear().toString(),titulo,texto,midia,tipo});
    salvarTextos(ts); idx=0;
    ['a-titulo','a-texto','a-semana'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('a-file-nome').textContent='escolher arquivo...';
    document.getElementById('prev-img').style.display='none';
    document.getElementById('prev-vid').style.display='none';
    fi.value='';
    st.textContent='✓ publicado com sucesso.'; st.className='admin-status ok';
    renderHero(); renderArquivo(); renderAdmin();
  }

  if (fi.files[0]) {
    const file=fi.files[0];
    if(file.size>4*1024*1024){st.textContent='arquivo muito grande (máx 4 MB).';st.className='admin-status err';return;}
    const tipo=file.type.startsWith('image')?'image':'video';
    const r=new FileReader(); r.onload=function(e){salvar(e.target.result,tipo);}; r.readAsDataURL(file);
  } else { salvar('','image'); }
}

function renderAdmin(){
  const ms=mensagens(),c=document.getElementById('a-msgs');
  if(!ms.length){c.innerHTML='<p class="sem-msgs">nenhuma mensagem ainda.</p>';return;}
  c.innerHTML=ms.map(function(m,i){
    return '<div class="msg-card '+(m.nova?'nova':'')+'">'+
      '<p class="msg-card-txt">"'+esc(m.texto)+'"</p>'+
      '<p class="msg-card-data">'+m.data+'</p>'+
      '<button class="btn-del" onclick="delMsg('+i+')">&#215;</button></div>';
  }).join('');
  ms.forEach(function(m){m.nova=false;}); salvarMensagens(ms);
}

function delMsg(i){const ms=mensagens();ms.splice(i,1);salvarMensagens(ms);renderAdmin();}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══ HASH ROUTING (admin) ══ */
function rotear(){
  if(window.location.hash==='#admin'){
    if(adminLogado){
      document.getElementById('view-admin').classList.add('open');
      document.body.style.overflow='hidden';
      renderAdmin();
    } else {
      document.getElementById('view-login').classList.add('open');
      document.body.style.overflow='hidden';
    }
  }
}

/* ══ INIT ══ */
document.addEventListener('DOMContentLoaded', function(){
  renderHero();
  renderArquivo();
  rotear();
  window.addEventListener('hashchange', rotear);
  document.getElementById('login-senha').addEventListener('keydown',function(e){if(e.key==='Enter')loginAdmin();});
});
</script>
